<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Alfin Aquatic · Lupa Password</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  
  <style>
    @keyframes float {
      0% { transform: translateY(0px) translateX(0) scale(1); opacity: 0.4; }
      50% { transform: translateY(-20px) translateX(5px) scale(1.05); opacity: 0.7; }
      100% { transform: translateY(0px) translateX(0) scale(1); opacity: 0.4; }
    }
    @keyframes float-slow {
      0% { transform: translateY(0) translateX(0) rotate(0deg); }
      33% { transform: translateY(-8px) translateX(-6px) rotate(2deg); }
      66% { transform: translateY(-4px) translateX(8px) rotate(-1deg); }
      100% { transform: translateY(0) translateX(0) rotate(0deg); }
    }
    @keyframes fade-slide-up {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .animate-float {
      animation: float 6s ease-in-out infinite;
    }
    .animate-float-slow {
      animation: float-slow 12s ease-in-out infinite;
    }
    .animate-fade-slide {
      animation: fade-slide-up 0.9s cubic-bezier(0.2, 0.9, 0.3, 1) forwards;
    }
    .bubble {
      position: absolute;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 100%;
      backdrop-filter: blur(1px);
      box-shadow: inset 0 0 8px rgba(255,255,255,0.6);
      pointer-events: none;
      z-index: 1;
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.4);
    }
    input:focus {
      outline: none;
      border-color: transparent;
      box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.15), 0 2px 6px rgba(0,0,0,0.03);
    }
    .btn-press:active {
      transform: scale(0.97);
    }
  </style>
</head>
<body class="font-sans antialiased bg-gradient-to-br from-emerald-700 via-teal-600 to-cyan-600 min-h-screen flex items-center justify-center relative overflow-x-hidden p-4">

  <!-- BACKGROUND BUBBLES -->
  <div class="absolute inset-0 overflow-hidden pointer-events-none z-0">
    <svg class="absolute bottom-0 left-0 w-full text-white/10" viewBox="0 0 1440 200" preserveAspectRatio="none">
      <path fill="currentColor" d="M0,128L48,138.7C96,149,192,171,288,165.3C384,160,480,128,576,117.3C672,107,768,117,864,138.7C960,160,1056,192,1152,186.7C1248,181,1344,139,1392,117.3L1440,96L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path>
    </svg>
    <svg class="absolute top-0 left-0 w-full text-emerald-200/20 rotate-180" viewBox="0 0 1440 320" preserveAspectRatio="none">
      <path fill="currentColor" d="M0,64L48,80C96,96,192,128,288,138.7C384,149,480,139,576,122.7C672,107,768,85,864,96C960,107,1056,149,1152,154.7C1248,160,1344,128,1392,112L1440,96L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path>
    </svg>
    
    <!-- Bubbles -->
    <div class="bubble w-16 h-16 left-[5%] top-[20%] opacity-30 animate-float"></div>
    <div class="bubble w-10 h-10 left-[15%] top-[70%] opacity-40 animate-float" style="animation-delay: 1.5s; animation-duration: 8s;"></div>
    <div class="bubble w-20 h-20 left-[80%] top-[45%] opacity-20 animate-float" style="animation-delay: 0.8s; animation-duration: 9s;"></div>
    <div class="bubble w-12 h-12 left-[60%] top-[85%] opacity-30 animate-float" style="animation-delay: 2.2s;"></div>
    <div class="bubble w-8 h-8 left-[40%] top-[10%] opacity-40 animate-float" style="animation-delay: 0.2s; animation-duration: 5s;"></div>
  </div>

  <!-- MAIN CARD -->
  <div class="relative z-10 w-full max-w-[400px] md:max-w-[440px] mx-auto animate-fade-slide">
    
    <!-- HEADER -->
    <div class="relative rounded-t-3xl rounded-b-2xl bg-gradient-to-r from-emerald-500 via-teal-400 to-cyan-400 p-6 shadow-xl overflow-hidden">
      <div class="absolute -right-6 -top-6 w-32 h-32 bg-white/20 rounded-full blur-xl"></div>
      <div class="absolute -left-4 bottom-2 w-16 h-16 bg-white/20 rounded-full blur-md"></div>
      
      <div class="flex items-center gap-3 relative">
        <div class="w-14 h-14 rounded-2xl bg-white/20 backdrop-blur-sm flex items-center justify-center text-white shadow-lg">
          <i class="fa-solid fa-key text-2xl"></i>
        </div>
        <div>
          <h1 class="text-2xl font-bold text-white drop-shadow-md">Lupa Password?</h1>
          <p class="text-sm text-emerald-50/90 font-light">Tenang, kami akan bantu reset</p>
        </div>
      </div>
    </div>

    <!-- CARD CONTENT -->
    <div class="glass-card rounded-2xl shadow-2xl mt-2 p-6 md:p-7 border border-white/30 text-gray-800 transition-all">
      
      <!-- Info Text -->
      <div class="text-center mb-6">
        <div class="w-20 h-20 mx-auto bg-emerald-100 rounded-full flex items-center justify-center mb-4">
          <i class="fa-solid fa-envelope-open-text text-3xl text-emerald-600"></i>
        </div>
        <h2 class="text-lg font-bold text-gray-800 mb-2">Reset Password</h2>
        <p class="text-sm text-gray-600">Masukkan email atau username Anda. Kami akan mengirimkan instruksi reset password.</p>
      </div>
      
      <!-- FORM RESET -->
      <div class="space-y-5">
        <!-- Email/Username Field -->
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1 ml-1">
            <i class="fa-regular fa-envelope mr-1 text-teal-600"></i>Email atau Username
          </label>
          <input type="text" placeholder="admin@alfinaquatic.com" class="w-full px-5 py-3.5 rounded-xl border border-gray-200 bg-white/70 focus:bg-white transition-colors placeholder:text-gray-400 text-gray-800 text-base">
        </div>

        <!-- Tombol Kirim -->
        <button class="btn-press relative w-full bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-500 hover:to-teal-500 text-white font-bold py-4 rounded-xl text-lg shadow-lg shadow-teal-600/30 hover:shadow-xl hover:shadow-teal-500/40 transition-all duration-300 active:scale-[0.98] mt-4 flex items-center justify-center gap-2">
          <i class="fa-regular fa-paper-plane"></i>
          <span>Kirim Instruksi Reset</span>
        </button>

        <!-- Link Kembali ke Login -->
        <div class="text-center mt-4">
          <a href="#" class="text-sm text-teal-600 hover:text-teal-700 font-medium transition flex items-center justify-center gap-1">
            <i class="fa-solid fa-arrow-left"></i>
            <span>Kembali ke halaman login</span>
          </a>
        </div>
      </div>
    </div>

    <!-- FOOTER DEKORATIF -->
    <div class="flex justify-between items-center mt-3 px-2 text-white/50 text-xs">
      <div class="flex gap-1">
        <i class="fa-solid fa-fish"></i>
        <i class="fa-solid fa-fish"></i>
        <i class="fa-solid fa-water"></i>
      </div>
      <div class="flex gap-1">
        <span class="w-1 h-1 bg-white/30 rounded-full"></span>
        <span class="w-1.5 h-1.5 bg-white/40 rounded-full animate-pulse"></span>
        <span class="w-1 h-1 bg-white/30 rounded-full"></span>
      </div>
    </div>
  </div>

  <!-- SUCCESS MODAL (Hidden by default) -->
  <div id="successModal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-2xl max-w-sm w-full p-6 shadow-2xl animate-fade-slide">
      <div class="text-center">
        <div class="w-20 h-20 mx-auto bg-emerald-100 rounded-full flex items-center justify-center mb-4">
          <i class="fa-solid fa-check text-4xl text-emerald-600"></i>
        </div>
        <h3 class="text-xl font-bold text-gray-800 mb-2">Email Terkirim!</h3>
        <p class="text-sm text-gray-600 mb-4">Kami telah mengirimkan instruksi reset password ke email Anda. Silakan cek kotak masuk.</p>
        <button onclick="closeModal()" class="w-full bg-gradient-to-r from-emerald-600 to-teal-600 text-white font-semibold py-3 rounded-xl hover:from-emerald-500 hover:to-teal-500 transition-all btn-press">
          Tutup
        </button>
      </div>
    </div>
  </div>

  <script>
    // Simulasi klik tombol kirim (untuk demo modal)
    document.querySelector('button[type="button"], .btn-press').addEventListener('click', function(e) {
      e.preventDefault();
      document.getElementById('successModal').classList.remove('hidden');
    });
    
    function closeModal() {
      document.getElementById('successModal').classList.add('hidden');
    }
    
    // Close modal with Escape key
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        closeModal();
      }
    });
  </script>
</body>
</html>
